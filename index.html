<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brochure Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #020916;
      --bg-2: #061429;
      --ink: #e7f0ff;
      --muted: #8ca0bf;
      --brand: #00a6ff;
      --brand-2: #29d0ff;
      --panel: rgba(7, 16, 33, 0.82);
      --line: #1b3154;
      --shadow: 0 20px 48px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: "IBM Plex Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 18%, rgba(0, 166, 255, 0.2), transparent 40%),
        radial-gradient(circle at 86% 22%, rgba(41, 208, 255, 0.14), transparent 38%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      position: relative;
      overflow-x: hidden;
    }

    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.45;
      z-index: -1;
    }

    .bg-shape-a {
      width: 360px;
      height: 360px;
      background: rgba(0, 166, 255, 0.35);
      top: -120px;
      right: -40px;
      animation: driftA 10s ease-in-out infinite;
    }

    .bg-shape-b {
      width: 420px;
      height: 420px;
      background: rgba(41, 208, 255, 0.26);
      bottom: -160px;
      left: -100px;
      animation: driftB 12s ease-in-out infinite;
    }

    .container {
      width: min(1050px, 92vw);
      margin: 42px auto 56px;
      display: grid;
      gap: 20px;
    }

    .hero {
      animation: rise 600ms ease both;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-weight: 700;
      color: var(--brand);
      margin: 0;
    }

    h1,
    h2,
    h3 {
      font-family: "Sora", sans-serif;
    }

    h1 {
      margin: 8px 0;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      line-height: 1.15;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 65ch;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(7px);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow);
      animation: rise 700ms ease both;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    input,
    select,
    textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      color: var(--ink);
      background: rgba(4, 13, 28, 0.86);
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 2px solid var(--brand-2);
      outline-offset: 1px;
    }

    input::placeholder,
    textarea::placeholder {
      color: #6d82a5;
    }

    .full {
      margin-top: 14px;
    }

    .check {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }

    .actions,
    .card-actions,
    .dialog-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
      color: #001228;
      border-color: transparent;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 800;
      box-shadow: 0 9px 24px rgba(0, 166, 255, 0.28);
    }

    .btn-ghost {
      background: rgba(4, 13, 28, 0.62);
      border-color: var(--line);
      color: var(--ink);
    }

    .status {
      min-height: 1.2em;
      margin: 12px 0 0;
      color: var(--brand);
      font-weight: 700;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
    }

    .panel-head p {
      margin: 0;
      color: var(--muted);
    }

    .popup-form {
      padding: 16px;
    }

    .brochure-grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background:
        linear-gradient(180deg, rgba(8, 21, 43, 0.88), rgba(5, 14, 30, 0.9));
      animation: rise 820ms ease both;
    }

    .card p {
      color: var(--muted);
    }

    dialog {
      border: 1px solid var(--line);
      border-radius: 14px;
      width: min(760px, 94vw);
      max-height: 90vh;
      padding: 0;
      color: var(--ink);
      background: linear-gradient(180deg, rgba(9, 21, 43, 0.98), rgba(5, 14, 28, 0.98));
      box-shadow: var(--shadow);
    }

    dialog::backdrop {
      background: rgba(2, 7, 15, 0.72);
    }

    .dialog-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .icon-btn {
      background: rgba(4, 13, 28, 0.82);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      width: 30px;
      height: 30px;
      cursor: pointer;
    }

    .dialog-actions {
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      margin: 0;
    }

    .compact-note {
      padding-top: 0;
      border-top: 0;
    }

    .muted-note {
      margin: 0;
      color: var(--muted);
      font-weight: 500;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes driftA {
      0%,
      100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(-20px, 22px);
      }
    }

    @keyframes driftB {
      0%,
      100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(24px, -18px);
      }
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .panel-head {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="container">
    <section class="hero">
      <p class="eyebrow">Welcome</p>
      <h1>Accel UAV Brochure Download</h1>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Brochures</h2>
        <p>Select one to preview and download.</p>
      </div>

      <div class="brochure-grid">
        <article class="card">
          <h3>AccelUAV Flyers</h3>
          <p>Download our detailed product flyer.</p>
          <div class="card-actions">
            <button class="btn btn-primary" data-file="acceluav-flyers.pdf" data-title="AccelUAV Flyers">Get Brochure</button>
          </div>
        </article>

        <article class="card">
          <h3>AccelUAV Profile</h3>
          <p>View our company profile and offerings.</p>
          <div class="card-actions">
            <button class="btn btn-primary" data-file="acceluav-profile.pdf" data-title="AccelUAV Profile">Get Brochure</button>
          </div>
        </article>
      </div>
    </section>
  </main>

  <dialog id="leadDialog">
    <div class="dialog-head">
      <h3 id="formTitle">Contact Form</h3>
      <button id="closeForm" class="icon-btn" aria-label="Close">x</button>
    </div>
    <form id="leadForm" class="popup-form" novalidate>
      <div class="grid">
        <label>
          Full Name
          <input type="text" name="fullName" placeholder="Your full name" required />
        </label>

        <label>
          Company Name
          <input type="text" name="companyName" placeholder="Your company name" required />
        </label>

        <label>
          Email
          <input type="email" name="email" placeholder="you@example.com" required />
        </label>

        <label>
          Phone
          <input type="tel" name="phone" placeholder="+1 555 123 4567" required />
        </label>

        <label>
          Selected Brochure
          <input id="selectedBrochureLabel" type="text" readonly />
        </label>
      </div>

      <label class="check">
        <input type="checkbox" name="consent" required />
        I agree to be contacted regarding this brochure.
      </label>

      <div class="dialog-actions">
        <button type="submit" class="btn btn-primary">Submit and Download</button>
        <button type="button" id="cancelForm" class="btn btn-ghost">Cancel</button>
      </div>
      <p id="formStatus" class="status" aria-live="polite"></p>
    </form>
    <div class="dialog-actions compact-note">
      <p class="muted-note">Download starts automatically after successful submit.</p>
    </div>
  </dialog>

  <script>
    const form = document.getElementById("leadForm");
    const statusEl = document.getElementById("formStatus");
    const dialog = document.getElementById("leadDialog");
    const formTitle = document.getElementById("formTitle");
    const selectedBrochureLabel = document.getElementById("selectedBrochureLabel");
    const closeForm = document.getElementById("closeForm");
    const cancelForm = document.getElementById("cancelForm");

    let pendingDownloadPath = "";

    document.querySelectorAll("[data-file]").forEach((button) => {
      button.addEventListener("click", () => {
        pendingDownloadPath = button.getAttribute("data-file") || "";
        const title = button.getAttribute("data-title") || "Selected Brochure";

        formTitle.textContent = `Contact Form - ${title}`;
        selectedBrochureLabel.value = title;
        statusEl.textContent = "";

        if (!dialog.open) {
          dialog.showModal();
        }
      });
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!form.checkValidity()) {
        statusEl.textContent = "Please complete all required fields.";
        return;
      }

      if (!pendingDownloadPath) {
        statusEl.textContent = "Please select a brochure first.";
        return;
      }

      const data = new FormData(form);
      const payload = {
        fullName: data.get("fullName"),
        companyName: data.get("companyName"),
        email: data.get("email"),
        phone: data.get("phone"),
        brochureTitle: selectedBrochureLabel.value,
        brochureFile: pendingDownloadPath,
      };

      try {
        const response = await fetch("/api/contacts", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          let serverMessage = "Unable to save details. Please try again.";
          try {
            const body = await response.json();
            if (body && body.message) {
              serverMessage = body.message;
            }
          } catch (error) {
            // Keep default message if response body is not JSON.
          }
          statusEl.textContent = serverMessage;
          return;
        }

        statusEl.textContent = "Submitted successfully. Download is starting...";
        triggerDownload(pendingDownloadPath);
      } catch (error) {
        statusEl.textContent = "Server not reachable. Please run the app server.";
        return;
      }

      form.reset();
      pendingDownloadPath = "";
      setTimeout(() => dialog.close(), 450);
    });

    closeForm.addEventListener("click", closeDialog);
    cancelForm.addEventListener("click", closeDialog);

    dialog.addEventListener("click", (event) => {
      const bounds = dialog.getBoundingClientRect();
      const clickedOutside =
        event.clientX < bounds.left ||
        event.clientX > bounds.right ||
        event.clientY < bounds.top ||
        event.clientY > bounds.bottom;

      if (clickedOutside) {
        closeDialog();
      }
    });

    function closeDialog() {
      form.reset();
      statusEl.textContent = "";
      pendingDownloadPath = "";
      dialog.close();
    }

    function triggerDownload(path) {
      const fileName = String(path || "").trim();
      if (!fileName) {
        statusEl.textContent = "No brochure selected.";
        return;
      }

      const frame = document.createElement("iframe");
      frame.style.display = "none";
      frame.src = `/download/${encodeURIComponent(fileName)}`;
      document.body.appendChild(frame);

      setTimeout(() => frame.remove(), 60000);
    }
  </script>
</body>
</html>
